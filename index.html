<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VowToDo</title>
  <style>
    :root { --sage: #7E8C57; --gold: #C9A227; --bg: #FBF9F4; --ink: #3A3A32; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--bg); color: var(--ink);
      font-family: -apple-system, "Lexend", system-ui, sans-serif; }
    .card { text-align: center; padding: 2rem; }
    h1 { font-family: "Dancing Script", cursive; color: var(--sage);
      font-size: 3rem; margin: 0 0 .25rem; }
    p { margin: .25rem 0; color: #6b6b60; }
    .rule { width: 48px; height: 3px; background: var(--gold);
      margin: 1rem auto; border-radius: 2px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>VowToDo</h1>
    <div class="rule"></div>
    <p>Wedding planning, together.</p>
    <p>Coming soon.</p>
  </main>
</body>
</html>
