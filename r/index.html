<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSVP — VowToDo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sage:#7B8A56; --sage-deep:#6B7A48; --sage-soft:#8C9A6A;
    --accept:#7E8C57; --decline:#BE7C52; --gold:#C2A36B;
    --cream:#F0EBDF; --card:#FFFFFF; --ink:#2E2A22; --muted:#8C8674;
    --line:#E5DECE; --ink-btn:#262219; --invite-ink:#F4EFE3;
    --going-bg:#E7EADB; --going-ink:#5E6B3C;
    --cant-bg:#F1E1D5; --cant-ink:#A65F37;
    --pending-bg:#E9E4D6; --pending-ink:#857F6C;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--cream);color:var(--ink);
    font-family:'Lexend',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
  .script{font-family:'Dancing Script',cursive;font-weight:700;line-height:1.05}

  .previewbar{position:sticky;top:0;z-index:10;background:var(--gold);color:#3A3222;
    text-align:center;font-size:13.5px;font-weight:600;letter-spacing:.06em;
    padding:9px 14px}
  .previewbar b{text-transform:uppercase;letter-spacing:.14em}

  .page{display:grid;grid-template-columns:minmax(0,440px) minmax(0,1fr);min-height:100vh}

  /* ---------- Left invite panel ---------- */
  .invite{position:sticky;top:0;align-self:start;height:100vh;overflow:hidden;
    background:var(--sage);color:var(--invite-ink);
    padding:56px 48px;display:flex;flex-direction:column}
  body.haspreview .invite{top:40px;height:calc(100vh - 40px)}
  .invite .c{position:absolute;border-radius:50%;pointer-events:none}
  .invite .c1{width:340px;height:340px;background:var(--sage-soft);opacity:.45;top:-90px;right:-120px}
  .invite .c2{width:220px;height:220px;background:var(--sage-deep);opacity:.4;bottom:-70px;left:-80px}
  .invite > *{position:relative;z-index:1}
  .kicker{font-size:13px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;opacity:.85;margin:0}
  .invite .spacer{flex:1 1 auto;min-height:32px}
  .pre{font-size:16px;opacity:.9;margin:0 0 10px;font-weight:300}
  .couple{font-size:clamp(48px,6vw,72px);margin:0 0 14px;color:#FBF8EF}
  .post{font-size:16px;opacity:.92;margin:0;max-width:22ch;font-weight:300}
  .divider{height:1px;background:rgba(244,239,227,.35);margin:28px 0 22px;max-width:340px}
  .fact{display:flex;align-items:center;gap:12px;margin:0 0 14px;font-size:15.5px}
  .fact .ic{width:34px;height:34px;border-radius:10px;flex:0 0 auto;
    background:rgba(244,239,227,.16);display:grid;place-items:center}
  .fact svg{width:17px;height:17px;stroke:var(--invite-ink);fill:none;stroke-width:1.7}

  /* ---------- Right form panel ---------- */
  .form{padding:56px 40px 40px}
  .inner{max-width:640px;margin:0 auto}
  .heading{font-size:clamp(34px,4.4vw,46px);margin:0 0 6px;color:var(--ink)}
  .lead{color:var(--muted);margin:0 0 22px;font-size:15.5px}
  .lead b{color:var(--ink);font-weight:600}

  .covers{display:flex;flex-wrap:wrap;align-items:center;gap:8px;
    background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:18px;padding:12px 14px;margin:0 0 22px}
  .covers .lab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-right:2px}
  .who{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
    border-radius:999px;padding:4px 13px 4px 4px;font-size:14px;font-weight:500}
  .avatar{width:26px;height:26px;border-radius:999px;display:grid;place-items:center;
    font-size:12px;font-weight:700;color:#fff;flex:0 0 auto}

  .guest{background:var(--card);border:1px solid var(--line);border-radius:22px;
    padding:22px;margin:0 0 18px;box-shadow:0 1px 2px rgba(46,42,34,.03)}
  .ghead{display:flex;align-items:center;gap:13px;margin:0 0 4px}
  .ghead .meta{flex:1 1 auto;min-width:0}
  .gname{font-size:18px;font-weight:700;line-height:1.2}
  .gsub{font-size:12.5px;color:var(--muted);margin-top:1px}
  .pill{font-size:12.5px;font-weight:600;border-radius:999px;padding:6px 12px;white-space:nowrap}
  .pill.going{background:var(--going-bg);color:var(--going-ink)}
  .pill.cant{background:var(--cant-bg);color:var(--cant-ink)}
  .pill.pending{background:var(--pending-bg);color:var(--pending-ink)}
  .remove{font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:none;
    border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;white-space:nowrap}
  .remove:hover{color:#B23B2E;border-color:#B23B2E}

  .seclab{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:20px 0 10px}

  .nameinput{width:100%;font:inherit;font-size:16px;color:var(--ink);
    background:#fff;border:1.5px solid var(--line);border-radius:15px;padding:14px 16px}
  .nameinput:focus{outline:none;border-color:var(--accept);box-shadow:inset 0 0 0 1px var(--accept)}
  .nameinput::placeholder{color:#B9B3A2}

  .att{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .att.side3{grid-template-columns:1fr 1fr 1fr}
  .att button{display:flex;align-items:center;justify-content:center;gap:10px;
    border-radius:15px;border:1.5px solid var(--line);background:#fff;padding:15px;
    font:inherit;font-size:15.5px;font-weight:600;color:var(--ink);cursor:pointer;transition:transform .05s}
  .att button:active{transform:scale(.985)}
  .att .rc{width:22px;height:22px;border-radius:999px;border:2px solid #CBC6B6;flex:0 0 auto;
    display:grid;place-items:center;color:transparent}
  .att .accept[aria-pressed="true"]{background:var(--accept);border-color:var(--accept);color:#fff}
  .att .decline[aria-pressed="true"]{background:var(--decline);border-color:var(--decline);color:#fff}
  .att .sidebtn{gap:8px;padding:13px 8px;font-size:14.5px}
  .att .sidebtn[aria-pressed="true"]{background:var(--sage);border-color:var(--sage);color:#fff}
  .att button[aria-pressed="true"] .rc{background:#fff;border-color:#fff}
  .att .accept[aria-pressed="true"] .rc{color:var(--accept)}
  .att .decline[aria-pressed="true"] .rc{color:var(--decline)}
  .att .rc svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:3}

  .optlist{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;
    background:#fff;border:1.5px solid var(--line);border-radius:15px;padding:14px 16px;
    font:inherit;font-size:15.5px;color:var(--ink);cursor:pointer;transition:transform .05s}
  .opt:active{transform:scale(.99)}
  .opt .sw{width:22px;height:22px;border-radius:7px;flex:0 0 auto}
  .opt .lbl{flex:1 1 auto;font-weight:500}
  .opt .tick{width:24px;height:24px;border-radius:999px;border:2px solid #CBC6B6;flex:0 0 auto;
    display:grid;place-items:center;color:transparent}
  .opt .tick svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:3}
  .opt[aria-pressed="true"]{border-color:var(--accept);box-shadow:inset 0 0 0 1px var(--accept)}
  .opt[aria-pressed="true"] .tick{background:var(--accept);border-color:var(--accept);color:#fff}

  .declined{display:flex;align-items:center;gap:10px;background:#F6ECE2;color:#9C5A33;
    border-radius:14px;padding:14px 16px;font-size:14.5px;margin-top:18px}
  .declined svg{width:17px;height:17px;stroke:#9C5A33;fill:none;stroke-width:1.7;flex:0 0 auto}

  .addperson{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    background:none;border:1.5px dashed #C9C2AE;border-radius:18px;padding:16px;
    font:inherit;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;margin:0 0 18px}
  .addperson:hover{color:var(--sage-deep);border-color:var(--sage)}
  .addperson svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.2}

  .submitbar{position:sticky;bottom:0;padding:16px 0 8px;
    background:linear-gradient(180deg,rgba(240,235,223,0),var(--cream) 38%)}
  .submit{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    background:var(--ink-btn);color:var(--invite-ink);border:0;border-radius:999px;padding:18px;
    font:inherit;font-size:16.5px;font-weight:600;cursor:pointer;transition:transform .05s,opacity .2s}
  .submit:active{transform:scale(.99)}
  .submit:disabled{opacity:.6;cursor:default}
  .submit svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.2}
  .hint{text-align:center;color:var(--muted);font-size:13px;margin:10px 0 0;min-height:18px}
  .hint.ok{color:var(--going-ink)} .hint.err{color:#B23B2E}

  .notice{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px 22px;
    text-align:center;color:var(--muted);font-size:15px}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;margin:26px 0 0;opacity:.8}

  @media(max-width:860px){
    .page{grid-template-columns:1fr}
    .invite{position:static;height:auto;min-height:auto;padding:38px 24px 34px}
    body.haspreview .invite{top:auto;height:auto}
    .invite .spacer{display:none}
    .pre{margin-top:26px}
    .couple{font-size:clamp(44px,13vw,60px)}
    .form{padding:30px 18px 40px}
    .att{grid-template-columns:1fr}
    .att.side3{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="previewbar" id="previewbar" hidden><b>Preview</b> · this is how guests see the form — replies are disabled</div>
<div class="page">
  <aside class="invite" id="invite">
    <span class="c c1"></span><span class="c c2"></span>
    <p class="kicker">You're invited</p>
    <div class="spacer"></div>
    <div id="inviteBody"></div>
  </aside>

  <main class="form">
    <div class="inner">
      <h1 class="heading script" id="heading">Will we see you there?</h1>
      <p class="lead" id="lead"></p>
      <div id="covers"></div>
      <div id="guests"><div class="notice" id="notice">Loading your invitation…</div></div>
      <div class="submitbar" id="bar" hidden>
        <button class="submit" id="save">Send reply
          <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
        <p class="hint" id="status"></p>
      </div>
      <p class="foot">Powered by VowToDo</p>
    </div>
  </main>
</div>

<script>
// The vowtodo.com page calls the Supabase Edge Function (JSON API) cross-origin.
// Modes:
//   ?g=<token>,<token>   named link  — pre-created guests, update in place
//   ?s=<space_token>     generic link — visitor types their own name (+side); each submit creates new guests
//   &preview=1           owner preview — form renders and can be tapped, but sending is disabled
const API = 'https://ejfddddwqbjebwffgadc.supabase.co/functions/v1/rsvp';

const params = new URLSearchParams(location.search);
const g = params.get('g') || '';
const s = params.get('s') || '';
const PREVIEW = params.get('preview') === '1';
let GENERIC = !g && !!s;
let DATA = null;
const state = {};
let ORDER = [];         // generic mode: block ids in display order
let nextBlock = 1;
const MAX_PEOPLE = 10;  // matches the API's per-submission cap
const AV = ['#7E8C57', '#BE7C52', '#C2A36B', '#6E7C4A', '#9A6A8C'];
const SIDE_OPTS = [
  { value: 'bride', label: '👰 Bride’s guest' },
  { value: 'groom', label: '🤵 Groom’s guest' },
  { value: 'both',  label: '💑 Guest of both' },
];

const CHECK = '<svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 6"/></svg>';
const CROSS = '<svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>';
const PLUS  = '<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>';

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function firstName(n){return String(n||'').trim().split(/\s+/)[0]||'there';}
function initial(n){return (String(n||'').trim()[0]||'?').toUpperCase();}

function notice(msg){
  document.getElementById('guests').innerHTML = '<div class="notice">'+esc(msg)+'</div>';
  document.getElementById('bar').hidden = true;
}

function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return '';
  return dt.toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function buildInvite(space){
  const couple = String(space.name||'').replace(/[’'`]s\s+wedding$/i,'').replace(/\s+wedding$/i,'').trim();
  const parts = couple.split(/\s*&\s*|\s+and\s+/i).filter(Boolean);
  const coupleHtml = parts.length>=2
    ? esc(parts[0])+' &<br>'+esc(parts.slice(1).join(' & '))
    : esc(couple||'You\'re invited');
  let html = '<p class="pre">Together with their loved ones,</p>'
    + '<h2 class="couple script">'+coupleHtml+'</h2>'
    + '<p class="post">are getting married, and would be so glad to have you there.</p>';
  const date = fmtDate(space.wedding_date);
  if(date || space.venue) html += '<div class="divider"></div>';
  if(date){
    html += '<div class="fact"><span class="ic"><svg viewBox="0 0 24 24">'
      + '<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg></span>'
      + '<span>'+esc(date)+'</span></div>';
  }
  if(space.venue){
    html += '<div class="fact"><span class="ic"><svg viewBox="0 0 24 24">'
      + '<path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>'
      + '<span>'+esc(space.venue)+'</span></div>';
  }
  document.getElementById('inviteBody').innerHTML = html;
}

function statusPill(s){
  if(s==='attending') return '<span class="pill going">✓ Going</span>';
  if(s==='declined')  return '<span class="pill cant">Can\'t make it</span>';
  return '<span class="pill pending">Awaiting reply</span>';
}

/* --------- shared card sections (attendance + questions) --------- */

function appendQuestionSections(card, st, name){
  if(st.rsvp_status==='declined'){
    const d = document.createElement('div'); d.className = 'declined';
    d.innerHTML = CROSS.replace('viewBox','aria-hidden="true" viewBox')
      + '<span>We\'ll miss you'+(name?', '+esc(firstName(name)):'')+' — no further questions for you.</span>';
    card.appendChild(d);
    return;
  }
  for(const q of DATA.questions){
    const opts = Array.isArray(q.options) ? q.options : [];
    if(!opts.length) continue; // only render choice questions
    const ql = document.createElement('div'); ql.className = 'seclab'; ql.textContent = q.label; card.appendChild(ql);
    const list = document.createElement('div'); list.className = 'optlist';
    const multi = q.field_type === 'multi_select';
    const cur = st.answers[q.id];
    for(const opt of opts){
      const sel = multi ? (Array.isArray(cur) && cur.includes(opt.label)) : (cur === opt.label);
      list.appendChild(optRow(opt, sel, st, q.id, multi));
    }
    card.appendChild(list);
  }
}

function appendAttendance(card, st){
  const sec = document.createElement('div'); sec.className = 'seclab'; sec.textContent = 'Will you be attending?';
  card.appendChild(sec);
  const att = document.createElement('div'); att.className = 'att';
  att.appendChild(attBtn('accept','attending','Joyfully accept', st));
  att.appendChild(attBtn('decline','declined','Regretfully decline', st));
  card.appendChild(att);
}

/* ----------------------------- render ----------------------------- */

function render(){
  const root = document.getElementById('guests');
  root.innerHTML = '';

  if(GENERIC){
    ORDER.forEach((id, gi) => {
      const st = state[id];
      const card = document.createElement('div'); card.className = 'guest';

      // header
      const head = document.createElement('div'); head.className = 'ghead';
      head.innerHTML =
        '<span class="avatar" data-av style="background:'+AV[gi%AV.length]+'">'+esc(initial(st.name))+'</span>'
        + '<div class="meta"><div class="gname">'+(ORDER.length>1?('Person '+(gi+1)):'Your reply')+'</div>'
        + '<div class="gsub">Fill in your details below</div></div>'
        + statusPill(st.rsvp_status);
      card.appendChild(head);
      if(ORDER.length>1){
        const rm = document.createElement('button'); rm.type='button'; rm.className='remove'; rm.textContent='Remove';
        rm.addEventListener('click', ()=>{ ORDER = ORDER.filter(x=>x!==id); delete state[id]; render(); });
        head.appendChild(rm);
      }

      // name
      const nl = document.createElement('div'); nl.className='seclab'; nl.textContent='Your name';
      card.appendChild(nl);
      const inp = document.createElement('input');
      inp.className='nameinput'; inp.type='text'; inp.placeholder='Full name';
      inp.maxLength = 80; inp.autocomplete='name'; inp.value = st.name;
      inp.addEventListener('input', ()=>{
        st.name = inp.value;
        const av = card.querySelector('[data-av]'); if(av) av.textContent = initial(st.name);
      });
      card.appendChild(inp);

      // side
      const sl = document.createElement('div'); sl.className='seclab'; sl.textContent='Whose guest are you?';
      card.appendChild(sl);
      const sideRow = document.createElement('div'); sideRow.className='att side3';
      for(const so of SIDE_OPTS){
        const b = document.createElement('button'); b.type='button'; b.className='sidebtn';
        b.setAttribute('aria-pressed', st.side===so.value?'true':'false');
        b.textContent = so.label;
        b.addEventListener('click', ()=>{ st.side = so.value; render(); });
        sideRow.appendChild(b);
      }
      card.appendChild(sideRow);

      appendAttendance(card, st);
      appendQuestionSections(card, st, st.name);
      root.appendChild(card);
    });

    if(ORDER.length < MAX_PEOPLE){
      const add = document.createElement('button'); add.type='button'; add.className='addperson';
      add.innerHTML = PLUS + '<span>RSVP for another person</span>';
      add.addEventListener('click', ()=>{ addBlock(); render(); });
      root.appendChild(add);
    }
    updateSubmitLabel();
    return;
  }

  const total = DATA.guests.length;
  DATA.guests.forEach((guest, gi) => {
    const st = state[guest.token];
    const card = document.createElement('div'); card.className = 'guest';

    // header
    const head = document.createElement('div'); head.className = 'ghead';
    head.innerHTML =
      '<span class="avatar" style="background:'+AV[gi%AV.length]+'">'+esc(initial(guest.name))+'</span>'
      + '<div class="meta"><div class="gname">'+esc(guest.name)+'</div>'
      + '<div class="gsub">Guest '+(gi+1)+' of '+total+' · reply below</div></div>'
      + statusPill(st.rsvp_status);
    card.appendChild(head);

    appendAttendance(card, st);
    appendQuestionSections(card, st, guest.name);
    root.appendChild(card);
  });
}

function attBtn(cls, value, label, st){
  const b = document.createElement('button'); b.type='button'; b.className=cls;
  b.setAttribute('aria-pressed', st.rsvp_status===value?'true':'false');
  b.innerHTML = '<span class="rc">'+(value==='attending'?CHECK:CROSS)+'</span><span>'+esc(label)+'</span>';
  b.addEventListener('click', ()=>{
    st.rsvp_status = (st.rsvp_status===value) ? 'pending' : value;
    render();
  });
  return b;
}

function optRow(opt, sel, st, qid, multi){
  const b = document.createElement('button'); b.type='button'; b.className='opt';
  b.setAttribute('aria-pressed', sel?'true':'false');
  b.innerHTML = '<span class="sw" style="background:'+esc(opt.color||'#CBC6B6')+'"></span>'
    + '<span class="lbl">'+esc(opt.label)+'</span>'
    + '<span class="tick">'+CHECK+'</span>';
  b.addEventListener('click', ()=>{
    if(multi){
      let arr = Array.isArray(st.answers[qid]) ? st.answers[qid].slice() : [];
      if(arr.includes(opt.label)) arr = arr.filter(x=>x!==opt.label); else arr.push(opt.label);
      st.answers[qid] = arr.length ? arr : undefined;
    } else {
      st.answers[qid] = (st.answers[qid]===opt.label) ? undefined : opt.label;
    }
    render();
  });
  return b;
}

function submitLabel(n){
  if(n<=1) return 'Send reply';
  if(n===2) return 'Send both replies';
  return 'Send all '+n+' replies';
}
function updateSubmitLabel(){
  const n = GENERIC ? ORDER.length : (DATA ? DATA.guests.length : 1);
  document.getElementById('save').firstChild.textContent = submitLabel(n)+' ';
}

function addBlock(){
  const id = 'new_'+(nextBlock++);
  state[id] = { name:'', side:'both', rsvp_status:'pending', answers:{} };
  ORDER.push(id);
}

/* ------------------------------ save ------------------------------ */

async function save(){
  if(PREVIEW) return;
  const btn = document.getElementById('save'), st = document.getElementById('status');

  let bodyObj;
  if(GENERIC){
    const people = ORDER.map(id => state[id]).filter(p => p.name.trim().length > 0);
    if(people.length === 0){
      st.className='hint err'; st.textContent = 'Please fill in your name first.';
      return;
    }
    bodyObj = { space_token: s, responses: people.map(p => ({
      name: p.name.trim(), side: p.side, rsvp_status: p.rsvp_status, answers: p.answers,
    })) };
  } else {
    bodyObj = { responses: DATA.guests.map(guest => ({
      token: guest.token,
      rsvp_status: state[guest.token].rsvp_status,
      answers: state[guest.token].answers,
    })) };
  }

  btn.disabled = true; st.className='hint'; st.textContent = 'Sending…';
  try{
    const r = await fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(bodyObj)});
    const out = await r.json();
    if(!r.ok || out.error) throw new Error(out.error||'Save failed');

    if(GENERIC && Array.isArray(out.created_tokens) && out.created_tokens.length){
      // Swap to the personal (named) link so revisiting / re-submitting updates, not duplicates.
      GENERIC = false;
      history.replaceState(null, '', location.pathname + '?g=' + out.created_tokens.join(','));
      DATA = out;
      for(const k of Object.keys(state)) delete state[k];
      for(const guest of DATA.guests){
        state[guest.token] = {rsvp_status:guest.rsvp_status, answers:Object.assign({}, guest.answers)};
      }
      buildNamedChrome();
      render();
      st.className='hint ok'; st.textContent = 'Reply sent — this page is now your personal RSVP link. Bookmark it to make changes.';
      return;
    }

    if(Array.isArray(out.guests)){
      DATA.guests = out.guests;
      for(const guest of DATA.guests){
        state[guest.token] = {rsvp_status:guest.rsvp_status, answers:Object.assign({}, guest.answers)};
      }
      render();
    }
    st.className='hint ok'; st.textContent = 'Replies sent — thank you!';
  }catch(e){
    st.className='hint err'; st.textContent = (e&&e.message)?e.message:'Could not send. Please try again.';
  }finally{ btn.disabled = PREVIEW; }
}

/* ------------------------------ load ------------------------------ */

function buildNamedChrome(){
  const n = DATA.guests.length;
  document.getElementById('lead').innerHTML =
    'This invitation covers <b>'+n+' guest'+(n===1?'':'s')+'</b> — please reply for each below.';
  const covers = DATA.guests.map((gu,i)=>
    '<span class="who"><span class="avatar" style="background:'+AV[i%AV.length]+'">'+esc(initial(gu.name))+'</span>'+esc(gu.name)+'</span>'
  ).join('');
  document.getElementById('covers').innerHTML = '<span class="lab">This link covers</span>'+covers;
  updateSubmitLabel();
}

function buildGenericChrome(){
  document.getElementById('lead').innerHTML =
    'Let us know if you can make it — <b>fill in your name</b> and reply below.';
  document.getElementById('covers').innerHTML = '';
  updateSubmitLabel();
}

function enablePreview(){
  document.getElementById('previewbar').hidden = false;
  document.body.classList.add('haspreview');
  const btn = document.getElementById('save');
  btn.disabled = true;
  const st = document.getElementById('status');
  st.className='hint'; st.textContent = 'Preview mode — sending is disabled.';
}

async function load(){
  if(!g && !s){ notice('This RSVP link is missing its guest information.'); return; }
  try{
    const qs = GENERIC ? ('?s='+encodeURIComponent(s)) : ('?g='+encodeURIComponent(g));
    const r = await fetch(API + qs);
    const out = await r.json();
    if(!r.ok || out.error){ notice(out.error||'This RSVP link could not be opened.'); return; }
    DATA = out;
    buildInvite(DATA.space);

    if(GENERIC){
      addBlock();
      buildGenericChrome();
    } else {
      for(const guest of DATA.guests){
        state[guest.token] = {rsvp_status:guest.rsvp_status, answers:Object.assign({}, guest.answers)};
      }
      buildNamedChrome();
    }

    document.getElementById('save').addEventListener('click', save);
    document.getElementById('bar').hidden = false;
    render();
    if(PREVIEW) enablePreview();
  }catch(e){
    notice('Could not reach the server. Please check your connection and try again.');
  }
}

load();
</script>
</body>
</html>
